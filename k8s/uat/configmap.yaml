apiVersion: v1
kind: ConfigMap
metadata:
  name: crossbridge-config
  namespace: crossbridge-uat
data:
  APP_ENVIRONMENT: "UAT"
  APP_VERSION: "1.0.0"

# Architect note:
# ConfigMap holds non-sensitive config only
# If you had DB passwords, those go in Secrets (or Key Vault CSI driver)
# Never put sensitive values in ConfigMap — it's not encrypted
